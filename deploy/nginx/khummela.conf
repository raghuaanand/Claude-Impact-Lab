# KHUMMELA — Nginx reverse proxy (HTTP only until Certbot adds SSL)
#
# Install:
#   sudo cp deploy/nginx/khummela.conf /etc/nginx/sites-available/khummela
#   sudo sed -i 's/YOUR_DOMAIN/yourdomain.com/g' /etc/nginx/sites-available/khummela
#   sudo ln -sf /etc/nginx/sites-available/khummela /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS:
#   sudo certbot --nginx -d yourdomain.com

# Rate limiting zone (optional)
limit_req_zone $binary_remote_addr zone=khummela_limit:10m rate=10r/s;

upstream khummela_nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot will add SSL blocks here after: certbot --nginx -d YOUR_DOMAIN

    client_max_body_size 10M;

    # Security headers (Nginx layer)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        limit_req zone=khummela_limit burst=20 nodelay;

        proxy_pass http://khummela_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js static assets
    location /_next/static {
        proxy_pass http://khummela_nextjs;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
